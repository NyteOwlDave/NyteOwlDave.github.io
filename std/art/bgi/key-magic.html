<script modified="perform">
function perform( event ) {
    const ops = perform;
    try {
        const ge = event.target;
        const ip = ge.value.trim();
        if (! ip ) { return; }
        ops.history.add( ip );
        if ( macro( ip ) ) { return; }
        const op = exec( ip );
        console.log( op );
    } catch ( e ) {
        console . error ( e );
        window  . alert ( e );
    }
}
;
; perform.history = ( new Set() )
;
perform.out = function() {
    const ops = perform;
    const m = ( arr( ops.history ).sort() );
    if ( m.length ) {
        out( ( m ).join( "\n" ) );
    } else {
        out( "Input History is Empty" );
    }
}
;
</script>

<script modified="macro">
function macro( cmd ) {
    try {
        cmd = str( cmd );
        const pfx = cmd.charAt( 0 );
        cmd = str( cmd.slice( 1 ) );
        if ( "." === pfx ) {
            dot( cmd );
            return true;
        }
        if ( "@" === pfx ) {
            dot.visit( cmd );
            return true;
        }
        if ( "|" === pfx ) {
            show( cmd );
            return true;
        }
    } catch ( e ) {
        console . error ( e );
    } finally {
        console.debug( `🔥 TODO ~ Finish Macro Interpreter` );
    }
    return ( false );
}
</script>

<script>
function dot( s ) {
    s = ( str( s ) );
    if ( s ) {
        let u;
        if ( s.includes( "." ) ) {
           u = ( `http://localhost/dot/${s}` );
        } else {
           u = ( `http://localhost/dot/${s}.html` );
        }
       return ( dot.visit( u ) );
    } else {
        console.warn( `Ignored Empty Dot Rocket Name` );
    }
}
</script>

<script>
dot.visit = function( url ) {
    url = ( str( url ) );
    if ( url ) {
        if ( dot.agent( "retext" ) ) {
            dot.click( url );
            return;
        } else {
           return ( window.open( url, url, dot.options ) );
        }
    } else {
        console.warn( `Ignored URL Address` );
    }
}
;
; dot.options = ( `left=10,top=10,width=800,height=680` )
;
</script>

<script>
dot.click = function( url ) {
    url = str( url );
    const d = document;
    const a = d.createElement( "A" );
    a.target = ( a.href = url );
    a.click();
}
</script>

<script>
dot.agent = function( s ) {
    s = str( s ).toLowerCase();
    const n = navigator;
    const u = n.userAgent.toLowerCase();
    return ( u.includes( s ) );
}
</script>

<script>
function acquire( url ) {
    const _S_ = ( `SCRIPT` );
    const d = document;
    const h = d.head;
    const s = d.createElemenent( _S_ );
    h . appendChild( s );
    console.info( `Acquiring : ${url}` );
    s . src = ( url );
    return ( s );
}
</script>

<script>
function request( url, text_receiver, html_receiver ) {
    const gid  =( o )=> ( document.getElementById( o ) );
    const sop  = ( text_receiver || gid( "sop"  ) );
    const page = ( html_receiver || gid( "page" ) || sop );
    function accept( s ) {
        if ( s.trimStart().startsWith( "<" ) ) {
            page.innerHTML = ( s );
        } else {
            sop.innerText = ( s );
        }
        return ( s );
    }
    const rp = fetch( url );
    return (
        ( rp )
        . then  ( r => r.text() )
        . then  ( accept        )
        . catch ( accept        )
    );
}
</script>

<script modified="cpy">
cpy = function( s ) {
   const ed = elx( "TEXTAREA" );
   doc.body.appendChild( ed );
   ed.style.opacity = "0";
   ed.value = ( ( s ) || ( sop.innerText ) );

   ed.focus();
   doc.execCommand( "copy" );

   sop.focus();
   con.info( `📋 Copied to Clipboard` );
}

<script id="why.js" modified="why.js">
function why( source ) {
    const o = ( source || localStorage );
    if ( null === o ) {
        if ( null === localStorage ) {
            out( "🧝 Store is Unavailable" );
        } else {
            out( "🧝 Source is NULL" );

        return;
    }
    const m = mem( o );
    if ( m.length < 1 ) {
        out( "🧝 Source is EMPTY" );
        return;
    }
    const v = m.map( k => why.keyify( k ) );
    why.recent = out( v.join( "\n" ) );
};
