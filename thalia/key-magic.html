<script>
function perform( event ) {
    try {
        const ge = event.target;
        const ip = ge.value.trim();
        if (! ip ) { return; }
        if ( macro( ip ) ) { return; }
        const op = exec( ip );
        console.log( op );
    } catch ( e ) {
        console . error ( e );
        window  . alert ( e );
    }
}
</script>

<script>
function macro( cmd ) {
    console.debug( `TODO ~ Macro Interpreter` );
    return ( false );
}
</script>

<script>
function exec( cmd ) {
    return window.eval( cmd );
}
</script>

<script>
function acquire( url ) {
    const _S_ = ( `SCRIPT` );
    const d = document;
    const h = d.head;
    const s = d.createElemenent( _S_ );
    h . appendChild( s );
    console.info( `Acquiring : ${url}` );
    s . src = ( url );
    return ( s );
}
</script>

<script>
function request( url ) {
    function accept( s ) {
        if ( s.trimStart().startsWith( "<" ) ) {
            page.innerHTML = ( s );
        } else {
            sop.innerText = ( s );
        }
        return ( s );
    }
    const rp = fetch( url );
    return (
        ( rp )
        . then  ( r => r.text() )
        . then  ( accept        )
        . catch ( accept        )
    );
}
</script>

<script>
function snk() {
    const key = prompt( "Store Key to Edit?" );
    if (! key ) return;
    let q = key.trim();
    if (! q ) return;
    q = ( `?key=` ) + encodeURIComponent( q );
    const url = snk.home + q;
    window.open( url, url );
}
snk.home = ( `http://dave-legacy/app/hysteresis/pen.html` );
</script>

<script>
cpy = function() {
   const ed = elx( "TEXTAREA" );
   doc.body.appendChild( ed );
   ed.style.opacity = "0";
   ed.value = sop.innerText;
   ed.select();
   ed.focus();
   doc.execCommand( "copy" );
   doc.body.removeChild( ed );
   sop.focus();
   con.info( `📋 Copied to Clipboard` );
}
</script>

<script>
_CE = "contenteditable";
sed = function() {
  sop.setAttribute( _CE, "" );
  sop.focus();
  teb.textContent = "📑";
};
svw = function() {
  sop.removeAttribute( _CE );
  teb.textContent = "📝";
};
tog = function() {
   if ( sop.hasAttribute( _CE ) ) { svw(); }
   else { sed(); }
};
</script>

<script>
fsm = function() { sop.requestFullscreen(); }
</script>

<script>
how = function() {
    sop . innerText = (
        ( who )
        . join( "\n" )
    );
};
</script>

<script>
function why() {
    header.textContent = ( epilog.title );
    const m = sop.isk = dir();
    const v = m.map( k => ( `🔑 ${k}` ) );
    sop . innerText = v.join( "\n" );
};
</script>
