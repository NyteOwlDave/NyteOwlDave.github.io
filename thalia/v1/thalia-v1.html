<script>
function noStore() {
    return ( null === localStorage );
}
</script>
<script>
function getStoreKeys() {
    if ( noStore() ) { 
        return [ getStoreKey() ];
    }
    let keys = [];
    let store = localStorage;
    if ( store !== null ) {
        while ( keys.length < 420 ) {
            let k = store.key( keys.length );
            if ( k === null ) break;
            keys.push( k );
        }
    }
    return keys;
}
</script>
<script>
function setStoreKeys( keys ) {
    function option( k ) {
        let o = document.createElement( 'option' );
        o . value = k;
        list . appendChild( o );
    }
    let list = gid( 'store-keys' );
    list.innerHTML = "";
    let key  = getStoreKey();
    keys = ( keys || getStoreKeys() )
    if ( key ) {
        if (! keys.includes( key ) ) {
            keys.push( key );
        }
     }
    keys . forEach( option );
    showKeyCount( keys.length );
}
</script>

<script>

    let t = (

    let parts = ( t . split( " " ) );
    let decal = parts . shift();
    t = ( parts . join( "_" ) );
    return ( [ "on_", t, "()" ] .join( "" ) );
}

<script>

    switch ( span.textContent.trim() ) {
    case "📃" : return rstName();
    case "🔑" : return rstKey ();

}

<script>
function persistFavorites() {
    try {
        localStorage.setItem(
              FAVORITES_STORE_KEY
            , favorites.innerHTML
        );
    } catch ( e ) {
        console.log( e );
    }
}
function recoverFavorites() {
    try {
        let v = localStorage.getItem(
              FAVORITES_STORE_KEY
        );
        if ( null === v ) {
            return persistFavorites();
        }
        favorites.innerHTML = ( v );
    } catch ( e ) {
        console.log( e );
    }
}
function addFavorite( href, title, hint ) {
    let ae = favorites.appendChild(
        doc.createElement( "A" )
    );
    ae.href = ( href || "./" );
    title = String( title || "" ).trim();
    title = ( title || "Untitled" );
    hint  = String( hint || "" ).trim();
    hint  = ( hint || title );
    ae.title = hint;
    ae.textContent = title;
    return ( ae );
}
function removeFavorite( href ) {
    let ae = locateFavorite( href );
    ae.remove();
}
function locateFavorite( href ) {
    let doc = document;
    let arr =( o )=> Array.from( o );
    let faves = arr( favorites.querySelectorAll( "A" ) );
    function matches( ae ) {
        return ( ae.href === href );
    }
    return ( faves.filter( matches ) [ 0 ] );
}
