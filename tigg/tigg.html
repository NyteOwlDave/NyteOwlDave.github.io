<body>
<header id="header">    
    <figure id="logo_figure">
        <img id="logo_image" src="./favicon.ico" alt="Logo" title="TiGG Logo">
    </figure>
    <h1>🦇 TiGG</h1>
    <h4>Your Tiny GUID Generator</h4>
</header>

<h2>🗝️ Single Key</h2>
<div id="tikey_container">
    <input id="tikey" placeholder="(tikey)">
</div>
<div>
<menu>
    <button id="btn_single_key" onclick="on_single_key(event)">🪄 Generate</button>
    <button id="btn_filter_keys" onclick="on_filter_keys(event)">🗝️ Filter Keys</button>
</menu>
</div>

<h2>🏷️ Record Title</h2>
<div id="title_container">
    <input id="title_input" placeholder="(title)">
</div>
<div>
<menu>
    <button id="btn_register" onclick="on_register(event)">📑 Register</button>
    <button id="btn_review" onclick="on_review(event)">📝 Review</button>
    <button id="btn_update" onclick="on_update(event)">✅ Update</button>
    <button id="btn_discard" onclick="on_discard(event)">❎ Discard</button>
</menu> 
</div> 

<h2>📦 Multiple Keys</h2>
<div id="editors">
    <textarea id="sip" wrap="off" rows="11">
    </textarea>
</div>
<div>
<menu> 
 &nbsp;
    <button id="btn_save" onclick="on_save_file(event)">💾</button>
    <button id="btn_open" onclick="on_open_file(event)">📂</button>
    <!-- [ TODO : 📥 📤  ] -->
    <input type="filename" id="filename">
 &nbsp;
    <button id="btn_multi_key" onclick="on_multi_key(event)">🪄 Generate</button>
 &nbsp;
    <input type="number" id="key_count" value="10" placeholder="How Many Keys?">
</menu> 
</div>

<div id="hint_container">
    <span id="hint"></span>
</div>

<footer id="footer">
    <div id="messages"></div>
</footer>

<script details="Gadget References" group="🦇">
  const sip   = document.getElementById( 'sip' );
  const hint  = document.getElementById( 'hint' );
  const tikey = document.getElementById( 'tikey' );
  const filename = document.getElementById( 'filename' );
  const key_count = document.getElementById( 'key_count' );
  const messages = document.getElementById( 'messages' );
</script>

<script details="Show Message" group="🦇">
function message( s, decal ) {
    const str =( s )=> ( String( s || "" ).trim() );
    console.log( s );
    s = str( s );
    if ( s ) {
        const d = str( decal );
        const t = str( `${d} ${s}` );
        messages.textContent = ( t );
    }
    return ( s );
}
</script>

<script details="Show Error Message" group="🦇">
function crashed( e ) {
    console.error( e );
    s = e.message;
    if ( s ) {
        messages.textContent = ( `👮 ${s}` );
    }
    return ( e );
}
</script>

<script details="Generate Single Key" group="🦇">
function show_record_count() {
    const ops = TiggDB;
    const n = ops.dir().length;
    return message( `Total Records : ${n}` );
}
</script>

<script details="Generate Single Key" group="🦇">
    function on_single_key( event ) {
        try {
            tikey.value = TiGG();
        } catch ( e ) {
            crashed ( e );
        }
    }
</script>

<script details="Filter Keys" group="🦇">
    function on_filter_keys( event ) {
        try {
            const ops = TiggDB;
            const rex = tikey.value.trim();
            const m = ops.dir( rex );
            if (! m.length ) {
                m.push( `No matching keys` );
            }
            sip.value = m.join( "\n" );
        } catch ( e ) {
            crashed ( e );
        }
    }
</script>

<script details="Register Record" group="🦇">
    function on_register( event ) {
        try {
            const ops = TiggDB;
            const k = title_input.value.trim();
            const v = tikey.value.trim();
            if ( ops.tikey_exists( v ) ) {
                throw new Error( `TiKey Already Exists : ${v}` );
            }
            const r = ops.record( k, v );
            ops.register( r );
            show_record_count();
        } catch ( e ) {
            crashed ( e );
        }
    }
</script>

<script details="Update Record" group="🦇">
    function on_update( event ) {
        try {
            const ops = TiggDB;
            const t = sip.title;
            if (! t ) {
                throw new Error( `Missing TiKey` );
            }
            const r = JSON.parse( sip.value );
            const k = r.tikey;
            if ( k !== t ) {
                throw new Error( `Mismatched TiKey : ${k}` );
            }
            ops.write( k, r );
            sip.title = "";
            sip.value = "";
        } catch ( e ) {
            crashed ( e );
        }
    }
</script>

<script details="Discard Changes" group="🦇">
function on_discard( event ) {
    try {
        sip.title = "";
        sip.value = "";
    } catch ( e ) {
        crashed ( e );
    }
}
</script>

<script details="Review Record" group="🦇">
    function on_review( event ) {
        try {
            const ops = TiggDB;
            const k = tikey.value.trim();
            const r = ops.read( k );
            if ( r ) {
                sip.value = JSON.stringify( r, null, 2 );
                sip.title = ( k );
            } else {
                throw new Error( `Unknown TiKey : ${k}` );
            }
        } catch ( e ) {
            crashed ( e );
        }
    }
</script>

<script details="Save Registry File" group="🦇">
    function on_save_file( event ) {
        try {
            const ops = TiggDB;
            ops.save_file();
        } catch ( e ) {
            crashed ( e );
        }
    }
</script>

<script details="Open Registry File" group="🦇">
    function on_open_file( event ) {
        try {
            const msg = ( 
    `Any unsaved changes will be lost.\n\nContinue anyway?`
            );
            if (! window.confirm( msg ) ) {
                message( "🚫 Canceled" );
                return;
            }
            const ops = TiggDB;
            ops.open_file();
        } catch ( e ) {
            crashed ( e );
        }
    }
</script>

<script details="Generate Multiple Keys" group="🦇">
    function on_multi_key( event ) {
        try {
            TiGG.raw( getCount(), sip );
        } catch ( e ) {
            if ( e instanceof KeyCountError ) {
                e.report();
                return;
            }
            alert( e );
            throw e;
        }
    }
    function getCount() {
        function error( s ) {
            throw new KeyCountError( s );
        }
        try {
            key_count.classList.remove( "error" )
            let n = parseInt( key_count.value );
            if (! isFinite( n ) ) {
                error( "Please enter an integer" );
            }
            if ( n < 1  ) error( "Range is 1 to 42 keys " );
            if ( n > 42 ) error( "Range is 1 to 42 keys " );
            return n;
        } catch ( e ) {
            throw e; 
        }
    }
</script>

<script details="Key Count Error Class" group="🔴">
    class KeyCountError extends Error {
        constructor( message ) {
            super( message );
            this.hintGadget.innerText = message;
            this.inputGadget.classList.add( "error" );
        }
        get hintGadget() {
            return document.getElementById( 'hint' );
        }
        get hint() {
            return this.hintGadget.innerText;
        }
        get inputGadget() {
            return document.getElementById( 'key_count' );
        }
        get proposedCount() {
            return this.inputGadget.value;
        }
        report() {
            const hint = this.hint;
            const hintGadget = this.hintGadget;
            const inputGadget = this.inputGadget;
            const proposedCount = this.proposedCount;
            console.table(
                [
        [ "Hint"           , hint          ] ,
        [ "Hint Gadget"    , hintGadget    ] ,
        [ "Proposed Count" , proposedCount ] ,
        [ "Input Gadget"   , inputGadget   ]
                ]
            );
        }
    }
</script>

<script details="Init Gadgets" group="🦇">
function init_gadgets( event ) {
    btn_filter_keys . title = "🗝️ Filter Keys";
    btn_single_key . title = "🪄 Generate Single Key";
    btn_multi_key . title = "🪄 Generate Multiple Keys";
    btn_open . title = "💾 📂 Open Registry File";
    btn_save . title = "💾 Save Registry File";
    btn_register . title = "📑 Register New Entry";
    btn_review . title = "📝 Review Entry";
    btn_update . title = "✅ Update Entry";
    btn_discard . title = "❎ Discard Changes";
    sip . value = "";
    sip . title = "";
}
addEventListener( "load", init_gadgets );
</script>
