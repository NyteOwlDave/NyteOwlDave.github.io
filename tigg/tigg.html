<script details="Gadget References" group="🦇">
    const sip   = document.getElementById( 'sip' );
    const tikey = document.getElementById( 'tikey' );
    const title_input = document.getElementById( 'title_input' );
    const filename = document.getElementById( 'filename' );
    const key_count = document.getElementById( 'key_count' );
    const messages = document.getElementById( 'messages' );
    const hints = document.getElementById( 'hints' );
</script>

<script details="Show Message" group="🦇">
    function message( s, decal ) {
        const str =( s )=> ( String( s || "" ).trim() );
        console.log( s );
        s = str( s );
        if ( s ) {
            const d = str( decal );
            const t = str( `${d} ${s}` );
            messages.textContent = ( t );
        }
        return ( s );
    }
</script>

<script id="crashed.js" group="🦇">
    function crashed( e ) {
        console.error( e );
        s = e.message;
        if ( s ) {
            messages.textContent = ( `👮 ${s}` );
        }
        return ( e );
    }
</script>

<script id="todo.js" group="🦇">
    function todo( s ) {
        if ( s instanceof Event ) {
            s = ( s.target );
        }
        if ( s instanceof HTMLElement ) {
            s = ( s.title || s.textContent );
        }
        if ( s ) {
            return ( message( `TODO ~ ${s}`, `🚧` ) );
        } else {
            return ( message( `TODO`, `🚧` ) );
        }
    }
</script>

<script details="Generate Single Key" group="🦇">
    function show_record_count() {
        const ops = TiggDB;
        const n = ops.dir().length;
        return message( `Total Records : ${n}` );
    }
</script>

<script id="confirm_reload.js">
    function confirm_reload() {
        const msg = (
    `🚨 Any unsaved changes will be lost.\n\nContinue anyway?`
        );
        if (! window.confirm( msg ) ) {
            message( "🚫 Canceled" );
            return ( false );
        }
        return ( true );
    }
</script>

<script id="server-ops.js">
    function on_download( event ) {
        try {
            if (! confirm_reload() ) {
                return;
            }
            todo( event );
        } catch ( e ) {
            crashed ( e );
        }
    }
    function on_upload( event ) {
        try {
            todo( event );
        } catch ( e ) {
            crashed ( e );
        }
    }
</script>

<script id="store-ops.js">
    function on_persist( event ) {
        try {
            const ops = TiggDB;
            ops.persist();
            message( `Wrote Registry File to Store`, `🔏` );
        } catch ( e ) {
            crashed ( e );
        }
    }
    function on_recover( event ) {
        try {
            if (! confirm_reload() ) {
                return;
            }
            const ops = TiggDB;
            discard_changes();
            ops.recover();
            show_record_count();
        } catch ( e ) {
            crashed ( e );
        }
    }
    function on_store_keys( event ) {
        try {
            let store = localStorage;
            if ( null === store ) {
                store = { "(unavailable)" : null };
            }
            const m = Object.keys( store ).sort();
            discard_changes();
            sip.value = m.join( "\n" );
        } catch ( e ) {
            crashed ( e );
        }
    }
</script>

<script details="Generate Single Key" group="🦇">
    function on_single_key( event ) {
        try {
            tikey.value = TiGG();
        } catch ( e ) {
            crashed ( e );
        }
    }
</script>

<script details="Filter Keys" group="🦇">
    function on_filter_keys( event ) {
        try {
            const ops = TiggDB;
            const rex = tikey.value.trim();
            const m = ops.dir( rex );
            if (! m.length ) {
                m.push( `No matching keys` );
            }
            discard_changes();
            sip.value = m.join( "\n" );
        } catch ( e ) {
            crashed ( e );
        }
    }
    function on_lookup_key( event ) {
        try {
            const ops = TiggDB;
            const rt = title_input.value.trim();
            const rk = ops.tikey_from_title( rt );
            if ( rk ) {
                discard_changes();
                tikey.value = ( rk );
                title_input.value = ( rt );
            } else {
                throw new Error( `No such Title : "${rt}"` );
            }
        } catch ( e ) {
            crashed ( e );
        }
    }
</script>

<script details="Filter Titles" group="🦇">
    function on_filter_titles( event ) {
        try {
            const ops = TiggDB;
            const rex = title_input.value.trim();
            const m = ops.dir();
            const t = m.map( k => ( ops.records[ k ] .title ) );
            const w = ops.filter( t, rex );
            if (! w.length ) {
                w.push( `No matching titles` );
            }
            discard_changes();
            sip.value = w.join( "\n" );
        } catch ( e ) {
            crashed ( e );
        }
    }
    function on_lookup_title( event ) {
        try {
            const ops = TiggDB;
            const rk = tikey.value.trim();
            const re = ops.read( rk );
            if ( re ) {
                discard_changes();
                tikey.value = ( rk );
                title_input.value = ( re.title );
            } else {
                throw new Error( `No such TiKey : ${rk}` );
            }
        } catch ( e ) {
            crashed ( e );
        }
    }
</script>

<script details="Register Record" group="🦇">
    function on_register( event ) {
        try {
            const ops = TiggDB;
            const k = title_input.value.trim();
            const v = tikey.value.trim();
            if ( ops.tikey_exists( v ) ) {
                throw new Error( `TiKey Already Exists : ${v}` );
            }
            const r = ops.record( k, v );
            ops.register( r );
            show_record_count();
        } catch ( e ) {
            crashed ( e );
        }
    }
</script>

<script details="Update Record" group="🦇">
    function on_update( event ) {
        try {
            const ops = TiggDB;
            const t = sip.title;
            if (! t ) {
                throw new Error( `Missing TiKey` );
            }
            const r = JSON.parse( sip.value );
            const k = r.tikey;
            if ( k !== t ) {
                throw new Error( `Mismatched TiKey : ${k}` );
            }
            r.updated = ops.tidate();
            ops.write( k, r );
            message( `Updated Record : ${k}` );
            discard_changes();
        } catch ( e ) {
            crashed ( e );
        }
    }
</script>

<script details="Modify Each Record" group="🦇">
    function on_each( event ) {
        try {
            const ops = TiggDB;
            if ( sip.title ) {
                throw new Error(
                    `Can't replicate an existing record`
                );
            }
            const changes = jso( sip.value );
            ops.each( changes );
            message( `Changes applied to all entries` );
        } catch ( e ) {
            crashed ( e );
        }
    }
</script>

<script details="Discard Changes" group="🦇">
function on_discard( event ) {
    try {
        discard_changes();
    } catch ( e ) {
        crashed ( e );
    }
}
function discard_changes() {
    sip.title = ( title_input.value = "" );
    sip.value = "";
}
</script>

<script details="Review Record" group="🦇">
    function on_review( event ) {
        try {
            const ops = TiggDB;
            const k = tikey.value.trim();
            const r = ops.read( k );
            if ( r ) {
                sip.value = JSON.stringify( r, null, 2 );
                sip.title = ( k );
                title_input.value = ( r.title );
            } else {
                throw new Error( `Unknown TiKey : ${k}` );
            }
        } catch ( e ) {
            crashed ( e );
        }
    }
    function on_first( event ) {
        try {
            tikey.value = get_first_tikey();
            on_review( event )
        } catch ( e ) {
            crashed ( e );
        }
    }
    function on_prev( event ) {
        try {
            const tk = get_review_tikey();
            tikey.value = get_prev_tikey( tk );
            on_review( event )
        } catch ( e ) {
            crashed ( e );
        }
    }
    function on_next( event ) {
        try {
            const tk = get_review_tikey();
            tikey.value = get_next_tikey( tk );
            on_review( event )
        } catch ( e ) {
            crashed ( e );
        }
    }
    function on_last( event ) {
        try {
            tikey.value = get_last_tikey();
            on_review( event )
        } catch ( e ) {
            crashed ( e );
        }
    }
    function get_review_tikey() {
        return (
               ( sip.title )
            || ( tikey.value.trim() )
        );
    }
    function get_first_tikey() {
        const ops = TiggDB;
        const m = ops.dir();
        return ( m.shift() );
    }
    function get_last_tikey() {
        const ops = TiggDB;
        const m = ops.dir();
        return ( m.pop() );
    }
    function get_next_tikey( tk ) {
        const ops = TiggDB;
        const m = ops.dir();
        let i = m.indexOf( tk );
        i = pmod( i + 1, m.length );
        return m[ i ];
    }
    function get_prev_tikey( tk ) {
        const ops = TiggDB;
        const m = ops.dir();
        let i = m.indexOf( tk );
        i = pmod( i - 1, m.length );
        return m[ i ];
    }
    function pmod( n, m ) {
        n = ( n % m );
        return (
            ( n >= 0 ) ? ( n ) : ( n + m )
        );
    }
</script>

<script details="Save Registry File" group="🦇">
    function on_save_file( event ) {

<script details="Generate Multiple Keys" group="🦇">
    function on_multi_key( event ) {
        try {
            discard_changes();
            TiGG.raw( getCount(), sip );
        } catch ( e ) {
            if ( e instanceof KeyCountError ) {
                e.report();
                return;
            }
            crashed( e );
        }
    }
    function getCount() {
        function error( s ) {
            throw new KeyCountError( s );
        }
        try {
            key_count.classList.remove( "error" )
            let n = parseInt( key_count.value );
            if (! isFinite( n ) ) {
                error( "Please enter an integer" );
            }
            if ( n < 1  ) error( "Range is 1 to 42 keys " );
            if ( n > 42 ) error( "Range is 1 to 42 keys " );
            return n;
        } catch ( e ) {
            throw e;
        }
    }
</script>

<script details="Key Count Error Class" group="🔴">
    class KeyCountError extends Error {
        constructor( message ) {
            super( message );
            this.hintGadget.innerText = message;
            this.inputGadget.classList.add( "error" );
        }
        get hintGadget() {
            return document.getElementById( 'hints' );
        }
        get hint() {
            return this.hintGadget.innerText;
        }
        get inputGadget() {
            return document.getElementById( 'key_count' );
        }
        get proposedCount() {
            return this.inputGadget.value;
        }
        report() {
            const hint = this.hint;
            const hintGadget = this.hintGadget;
            const inputGadget = this.inputGadget;
            const proposedCount = this.proposedCount;
            console.table(
                [
        [ "Hint"           , hint          ] ,
        [ "Hint Gadget"    , hintGadget    ] ,
        [ "Proposed Count" , proposedCount ] ,
        [ "Input Gadget"   , inputGadget   ]
                ]
            );
        }
    }
</script>

<script id="morpheus.js">

function morpheus( event ) {
    if ( event.altKey ) {
        let u;
        const o = ( `left=10,top=10` );
        if ( event.ctrlKey ) {
            u = ( morpheus.build );
        } else if ( event.shiftKey ) {
            u = ( morpheus.home );
        } else {
            u = ( morpheus.repo );
        }
        window.open( u, u, o );
    } else {
        window.location = "./../index.html";
    }
}
